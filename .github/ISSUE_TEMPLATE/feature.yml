name: Feature request
description: Suggest a new capability or behaviour
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What's your proposed solution?
      description: Optional. If you have one in mind.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Optional.
    validations:
      required: false
